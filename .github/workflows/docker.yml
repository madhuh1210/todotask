name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Image
        run: docker build -t madhu1210/productivity-backend ./backend

      - name: Build Frontend Image
        run: docker build -t madhu1210/productivity-frontend ./frontend

      - name: Push Backend Image
        run: docker push madhu1210/productivity-backend

      - name: Push Frontend Image
        run: docker push madhu1210/productivity-frontend

      - name: Done
        run: echo "CI/CD Completed 🚀"