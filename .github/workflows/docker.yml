name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Backend Image
    run: docker build -t madhu1210/productivity-backend:latest ./backend

  - name: Build Frontend Image
    run: docker build -t madhu1210/productivity-frontend:latest ./frontend

  - name: Push Backend Image
    run: docker push madhu1210/productivity-backend:latest

  - name: Push Frontend Image
    run: docker push madhu1210/productivity-frontend:latest

  - name: CI/CD Completed
    run: echo "Docker images built and pushed successfully 🚀"
```
